<div class="smartgraph"><smrtgraph-menu></smrtgraph-menu>
<mat-sidenav-container class="upperSection">
  <button type="button" class="sidenavToggle" mat-raised-button [color]="'accent'" (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-sidenav #sidenav [mode]="'side'" [opened]="true" >
    <!-- sidenav content -->
    <smrtgraph-search></smrtgraph-search>
  </mat-sidenav>
    <div class="info-panel" [ngClass]="{'sidenav-opened': sidenav.opened === true }">
      <app-node-details-box></app-node-details-box>
    </div>
    <!-- primary content -->
    <graph class="upperSection"></graph>
  <div class="reset-holder">
    <button mat-flat-button (click)="reset()" [color]="'primary'">Reset Zoom</button>
    <download-button></download-button>
  </div>
  <mat-sidenav #settingsToggle [mode]="'over'" position="end">
      <app-smrtgraph-settings></app-smrtgraph-settings>
    </mat-sidenav>
</mat-sidenav-container>

<div fxLayout="row" fxLayoutGap="10px" class="link-list-row">
  <div fxFlex="100">
    <app-graph-details></app-graph-details>
  </div>
</div>

<footer>
  <mat-toolbar color="primary" class="footer-toolbar">
    <span class="footer-spacer"></span>
    <div class="footer-links">
      <a href="https://ncats.nih.gov/" class="footer-link" target="_blank" rel="noopener noreferrer">NCATS Home</a>
      <span class="footer-divider">|</span>
      <a href="https://www.hhs.gov/vulnerability-disclosure-policy/index.html" class="footer-link" target="_blank" rel="noopener noreferrer">HHS Vulnerability Disclosure</a>
    </div>
    <span class="footer-spacer"></span>
  </mat-toolbar>
</footer>

</div>
